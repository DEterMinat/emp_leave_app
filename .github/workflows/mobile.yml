name: Mobile CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  quality-and-build:
    name: Build & Quality Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: Mobile/emp_leave_app

    steps:
    - name: 🚀 Checkout Code
      uses: actions/checkout@v4
    
    - name: 🛠️ Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'latest'
        channel: 'stable'
        cache: true # Built-in caching for Flutter SDK
        
    - name: 📦 Cache Pub Packages
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('Mobile/emp_leave_app/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: 📥 Get Dependencies
      run: flutter pub get
      
    - name: 🔍 Static Analysis
      run: flutter analyze
      
    - name: 🧪 Run Unit Tests
      run: flutter test --coverage
      
    - name: 📱 Build Android APK (Release)
      run: flutter build apk --release
      
    - name: 🌐 Build Flutter Web
      run: flutter build web --release

    - name: 📤 Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: Mobile/emp_leave_app/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7

    - name: 📤 Upload Web Artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-release
        path: Mobile/emp_leave_app/build/web
        retention-days: 7

    - name: 🐳 Build Docker Image (Web)
      run: docker build -t emp-leave-mobile:latest .
