name: Mobile CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "mobile-pages"
  cancel-in-progress: false

jobs:
  # =============================================
  # Stage 1: Static Analysis
  # =============================================
  analyze:
    name: 🔍 Static Analysis
    runs-on: ubuntu-latest

    steps:
    - name: 🚀 Checkout Code
      uses: actions/checkout@v4

    - name: 🛠️ Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: 📦 Cache Pub Packages
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: 📥 Get Dependencies
      run: |
        touch .env
        flutter pub get

    - name: 🔍 Run Analyzer
      run: |
        echo "## 🔍 Static Analysis" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        flutter analyze 2>&1 | tee analyze-output.txt
        if grep -q "No issues found" analyze-output.txt; then
          echo "✅ No issues found" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Issues detected — see output above" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 analyze-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
      continue-on-error: true

    - name: 🔐 Check Outdated Packages
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📦 Dependency Check" >> $GITHUB_STEP_SUMMARY
        flutter pub outdated 2>&1 | tail -20 | tee -a $GITHUB_STEP_SUMMARY || true
      continue-on-error: true

  # =============================================
  # Stage 2: Test & Coverage
  # =============================================
  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: analyze

    steps:
    - name: 🚀 Checkout Code
      uses: actions/checkout@v4

    - name: 🛠️ Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: 📦 Cache Pub Packages
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: 📥 Get Dependencies
      run: |
        touch .env
        flutter pub get

    - name: 🧪 Run Tests with Coverage
      run: |
        flutter test --coverage --machine > test-results.json 2>&1 || true
        flutter test --coverage 2>&1 | tee test-output.txt

    - name: 📊 Upload Coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: flutter-coverage
        path: coverage/lcov.info
        retention-days: 14

    - name: 📈 Test Summary
      if: always()
      run: |
        echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f test-output.txt ]; then
          PASSED=$(grep -c "✓" test-output.txt || echo "0")
          FAILED=$(grep -c "✗" test-output.txt || echo "0")
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
        fi
        if [ -f coverage/lcov.info ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Coverage report uploaded as artifact" >> $GITHUB_STEP_SUMMARY
        fi

  # =============================================
  # Stage 3: Build Android APK
  # =============================================
  build-android:
    name: 📱 Build Android
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: 🚀 Checkout Code
      uses: actions/checkout@v4

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🛠️ Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: 📦 Cache Pub Packages
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: 📥 Get Dependencies
      run: |
        touch .env
        flutter pub get

    - name: 📱 Build APK (Release)
      run: flutter build apk --release
      continue-on-error: true

    - name: 📤 Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 14

  # =============================================
  # Stage 4: Build Web & Deploy to GitHub Pages
  # =============================================
  build-web:
    name: 🌐 Build Web & Deploy
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: 🚀 Checkout Code
      uses: actions/checkout@v4

    - name: 🛠️ Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: 📥 Get Dependencies
      run: |
        touch .env
        flutter pub get

    - name: 🌐 Build Flutter Web (Release)
      run: flutter build web --release --base-href /emp_leave_app/

    - name: 📤 Upload Web Build
      uses: actions/upload-artifact@v4
      with:
        name: web-release
        path: build/web
        retention-days: 14

    - name: 📄 Setup GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: actions/configure-pages@v4

    - name: 📤 Upload Pages Artifact
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/web

    - name: 🌐 Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      id: deployment
      uses: actions/deploy-pages@v4

    - name: 📋 Build Summary
      run: |
        echo "## 🌐 Web Build" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
        echo "| APK | See \`android-release-apk\` artifact |" >> $GITHUB_STEP_SUMMARY
        echo "| Web | See \`web-release\` artifact |" >> $GITHUB_STEP_SUMMARY
